name: FinSecure — CI/CD Pipeline (DevSecOps)

on:
  push:
    branches: [main]
    paths:
      - 'tp4-finsecure/**'
      - '.github/workflows/finsecure-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tp4-finsecure/**'
      - '.github/workflows/finsecure-deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_REGION:  ${{ secrets.GKE_REGION }}
  REGISTRY:    europe-west9-docker.pkg.dev

jobs:
  # ==========================================================
  # Job 1 : Build & Push
  # ==========================================================
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authentification GCP (Workload Identity - sans clé JSON)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurer Docker pour Artifact Registry
        run: gcloud auth configure-docker ${REGISTRY} --quiet

      - name: Build & Push image FinSecure
        id: meta
        run: |
          IMAGE="${REGISTRY}/${PROJECT_ID}/tp3-app-registry/finsecure-app:${GITHUB_SHA}"
          docker build -t ${IMAGE} tp4-finsecure/
          docker push ${IMAGE}
          echo "image-tag=${IMAGE}" >> $GITHUB_OUTPUT

  # ==========================================================
  # Job 2 : Scan de sécurité (Trivy) — AVANT déploiement
  # ==========================================================
  security-scan:
    name: Scan Vulnérabilités
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Installer Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Configurer Docker pour Artifact Registry
        run: gcloud auth configure-docker ${REGISTRY} --quiet

      - name: Scanner l'image pour les vulnérabilités critiques
        run: |
          trivy image \
            --exit-code 1 \
            --severity "CRITICAL,HIGH" \
            --ignore-unfixed \
            --format table \
            ${{ needs.build-push.outputs.image-tag }}

      - name: Générer un rapport SARIF
        if: always()
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            ${{ needs.build-push.outputs.image-tag }}

      - name: Uploader le rapport dans GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ==========================================================
  # Job 3 : Deploy sur GKE (seulement si le scan passe)
  # ==========================================================
  deploy:
    name: Deploy sur GKE
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authentification GCP (Workload Identity - sans clé JSON)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl'

      - name: Configurer kubectl
        run: |
          gcloud container clusters get-credentials ${GKE_CLUSTER} \
            --region=${GKE_REGION} --project=${PROJECT_ID}

      - name: Déployer l'application FinSecure
        run: |
          kubectl set image deployment/finsecure-app \
            finsecure-app=${{ needs.build-push.outputs.image-tag }} \
            -n default

      - name: Attendre le déploiement
        run: |
          kubectl rollout status deployment/finsecure-app -n default --timeout=5m

      - name: Vérification post-déploiement
        run: |
          kubectl get pods -n default
          echo "Déploiement FinSecure réussi"
