name: LogiStream — CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'tp3-logistream/**'
      - '.github/workflows/logistream-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tp3-logistream/**'
      - '.github/workflows/logistream-deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_REGION:  ${{ secrets.GKE_REGION }}
  REGISTRY:    europe-west9-docker.pkg.dev

jobs:
  # ==========================================================
  # Job 1 : Tests
  # ==========================================================
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances producer
        run: npm install
        working-directory: tp3-logistream/producer
      - name: Installer les dépendances consumer
        run: npm install
        working-directory: tp3-logistream/consumer
      - name: Tests producer
        run: npm test
        working-directory: tp3-logistream/producer
      - name: Tests consumer
        run: npm test
        working-directory: tp3-logistream/consumer
      - name: Valider les manifests Kubernetes
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -summary -ignore-missing-schemas tp3-logistream/k8s/*.yaml

  # ==========================================================
  # Job 2 : Build & Push
  # ==========================================================
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configurer Docker
        run: gcloud auth configure-docker ${REGISTRY} --quiet
      - name: Build & Push GPS Producer
        run: |
          docker build -t ${REGISTRY}/${PROJECT_ID}/tp2-registry/gps-producer:${GITHUB_SHA} tp3-logistream/producer/
          docker push ${REGISTRY}/${PROJECT_ID}/tp2-registry/gps-producer:${GITHUB_SHA}
      - name: Build & Push Tracker Consumer
        run: |
          docker build -t ${REGISTRY}/${PROJECT_ID}/tp2-registry/tracker-consumer:${GITHUB_SHA} tp3-logistream/consumer/
          docker push ${REGISTRY}/${PROJECT_ID}/tp2-registry/tracker-consumer:${GITHUB_SHA}

  # ==========================================================
  # Job 3 : Deploy sur GKE
  # ==========================================================
  deploy:
    name: Deploy sur GKE
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl'
      - name: Configurer kubectl
        run: |
          gcloud container clusters get-credentials ${GKE_CLUSTER} \
            --region=${GKE_REGION} --project=${PROJECT_ID}
      - name: Mettre à jour le GPS Producer
        run: |
          kubectl set image deployment/gps-producer \
            gps-producer=${REGISTRY}/${PROJECT_ID}/tp2-registry/gps-producer:${GITHUB_SHA} \
            -n logistream
      - name: Mettre à jour le Tracker Consumer
        run: |
          kubectl set image deployment/tracker-consumer \
            tracker-consumer=${REGISTRY}/${PROJECT_ID}/tp2-registry/tracker-consumer:${GITHUB_SHA} \
            -n logistream
      - name: Attendre les déploiements
        run: |
          kubectl rollout status deployment/gps-producer -n logistream --timeout=5m
          kubectl rollout status deployment/tracker-consumer -n logistream --timeout=5m
      - name: Vérification post-déploiement
        run: |
          kubectl get pods -n logistream
          kubectl get kafkatopics -n logistream
          echo "Déploiement LogiStream réussi"
